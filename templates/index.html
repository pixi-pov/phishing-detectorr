<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishingShield | Scanner</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-base: #050505;
            --surface: rgba(20, 20, 22, 0.6);
            --surface-hover: rgba(30, 30, 35, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --border-highlight: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
            --text-muted: #a1a1aa;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.2);
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.1);
            --danger: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.1);
            --warning: #f59e0b;
            --nav-bg: rgba(5, 5, 5, 0.5);
            --input-bg: rgba(0, 0, 0, 0.4);
            --input-focus: rgba(0, 0, 0, 0.6);
            --list-bg: rgba(0, 0, 0, 0.3);
            --list-hover: rgba(255, 255, 255, 0.02);
            --icon-bg: rgba(0, 0, 0, 0.2);
            --chip-bg: rgba(255, 255, 255, 0.03);
            --chip-hover: rgba(255, 255, 255, 0.08);
            --active-mode-bg: rgba(255, 255, 255, 0.1);
        }

        body.light-theme {
            --bg-base: #f8fafc;
            --surface: rgba(255, 255, 255, 0.8);
            --surface-hover: rgba(255, 255, 255, 1);
            --border: rgba(0, 0, 0, 0.08);
            --border-highlight: rgba(0, 0, 0, 0.15);
            --text: #0f172a;
            --text-muted: #64748b;
            --primary: #2563eb;
            --primary-glow: rgba(37, 99, 235, 0.15);
            --success: #059669;
            --success-bg: rgba(16, 185, 129, 0.15);
            --danger: #dc2626;
            --danger-bg: rgba(239, 68, 68, 0.15);
            --warning: #d97706;
            --nav-bg: rgba(255, 255, 255, 0.7);
            --input-bg: rgba(255, 255, 255, 0.6);
            --input-focus: rgba(255, 255, 255, 0.9);
            --list-bg: rgba(255, 255, 255, 0.5);
            --list-hover: rgba(0, 0, 0, 0.02);
            --icon-bg: rgba(255, 255, 255, 0.4);
            --chip-bg: rgba(0, 0, 0, 0.04);
            --chip-hover: rgba(0, 0, 0, 0.08);
            --active-mode-bg: rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(circle at 50% 0%, var(--primary-glow) 0%, transparent 50%),
                linear-gradient(to right, var(--border) 1px, transparent 1px),
                linear-gradient(to bottom, var(--border) 1px, transparent 1px);
            background-size: 100% 100%, 24px 24px, 24px 24px;
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 72px;
            background: var(--nav-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 100;
        }

        .logo { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 20px; }
        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--primary), #60a5fa);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: white;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .nav-controls { display: flex; align-items: center; gap: 16px; }
        .nav-links { display: flex; gap: 8px; background: var(--surface); padding: 6px; border-radius: 12px; border: 1px solid var(--border); }
        .nav-link { padding: 8px 20px; border-radius: 8px; text-decoration: none; color: var(--text-muted); font-size: 14px; font-weight: 600; transition: all 0.3s ease; }
        .nav-link:hover { color: var(--text); }
        .nav-link.active { color: var(--text); background: rgba(128, 128, 128, 0.2); }

        .theme-toggle {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            width: 40px; height: 40px; border-radius: 12px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 20px; transition: all 0.3s ease;
        }

        main { max-width: 800px; margin: 0 auto; padding: 140px 24px 80px; }
        header { text-align: center; margin-bottom: 56px; }

        h1 { font-size: 42px; font-weight: 700; letter-spacing: -1px; margin-bottom: 12px; }
        h1 span {
            background: linear-gradient(135deg, var(--text), var(--text-muted));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        h1 .highlight {
            background: linear-gradient(135deg, var(--primary), #60a5fa);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .mode-selector {
            display: flex; gap: 4px; margin: 0 auto 32px; padding: 6px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; width: fit-content; backdrop-filter: blur(12px);
        }

        .mode-btn {
            padding: 10px 24px; border: none; background: transparent;
            color: var(--text-muted); font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease;
            display: flex; align-items: center; gap: 8px;
        }
        .mode-btn.active { background: var(--active-mode-bg); color: var(--text); border-radius: 10px; }

        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 20px; padding: 32px;
            box-shadow: 0 24px 48px rgba(0,0,0,0.1);
            perspective: 1000px;
        }

        input[type="text"], textarea {
            width: 100%; padding: 16px 20px 16px 52px;
            background: var(--input-bg); border: 1px solid var(--border);
            border-radius: 14px; color: var(--text); font-size: 16px;
            transition: all 0.3s ease;
        }
        textarea { padding: 20px; min-height: 180px; font-family: 'JetBrains Mono', monospace; }

        .btn {
            width: 100%; padding: 16px; border: none; border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), #2563eb);
            color: white; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 8px 24px var(--primary-glow);
        }
        .btn:disabled { background: #27272a; color: #71717a; box-shadow: none; cursor: not-allowed; }

        /* DNA Scanner Animation */
        .dna-scanner { width: 200px; height: 60px; margin: 0 auto; position: relative; display: none; margin-bottom: 20px; }
        .dna-scanner.active { display: block; }
        .dna-line { stroke: var(--primary); stroke-width: 2; fill: none; stroke-dasharray: 20; animation: dnaFlow 2s linear infinite; }
        @keyframes dnaFlow { from { stroke-dashoffset: 40; } to { stroke-dashoffset: 0; } }
        .scan-bar { position: absolute; top: 0; width: 100%; height: 2px; background: var(--primary); box-shadow: 0 0 15px var(--primary); animation: moveScan 2s ease-in-out infinite; }
        @keyframes moveScan { 0%, 100% { top: 0%; } 50% { top: 100%; } }

        /* Result Styles */
        .result { margin-top: 32px; display: none; }
        .result.show { display: block; }

        .result-header { display: flex; align-items: center; gap: 20px; padding: 24px; border-radius: 16px; margin-bottom: 24px; border: 1px solid var(--border); }
        .result-safe { background: var(--success-bg); border-color: rgba(16, 185, 129, 0.2); }
        .result-danger { background: var(--danger-bg); border-color: rgba(239, 68, 68, 0.2); }
        .result-warning { background: rgba(245, 158, 11, 0.05); border-color: rgba(245, 158, 11, 0.2); }

        .stats-radar-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: center; }
        .stats { display: flex; flex-direction: column; gap: 16px; }
        .stat { padding: 16px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 12px; }
        .stat-value { font-size: 24px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
        .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 24px; }
        .detail-item { padding: 16px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px; }
        .detail-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
        .detail-value { font-size: 13px; font-weight: 600; color: var(--text); }

        .alerts { margin-top: 32px; }
        .alert { display: flex; gap: 16px; padding: 16px; background: rgba(0,0,0,0.2); border-radius: 12px; margin-bottom: 12px; border-left: 4px solid var(--border); }
        .alert-high { border-left-color: var(--danger); }
        .alert-medium { border-left-color: var(--warning); }
        .alert-icon { font-size: 20px; }
        .alert-text strong { display: block; font-size: 14px; margin-bottom: 2px; }
        .alert-text span { font-size: 13px; color: var(--text-muted); }

        .loading { display: none; text-align: center; padding: 40px; flex-direction: column; align-items: center; }
        .loading.show { display: flex; }

        .quick-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: center; }
        .chip { padding: 6px 14px; background: var(--chip-bg); border: 1px solid var(--border); border-radius: 30px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .chip:hover { background: var(--chip-hover); }

        .app-footer { text-align: center; padding: 32px; border-top: 1px solid var(--border); margin-top: 60px; color: var(--text-muted); font-size: 14px; }
        .app-footer span { font-weight: 600; color: var(--text); }

        .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 24px; }
        .summary-item { text-align: center; padding: 16px; background: var(--list-bg); border-radius: 12px; border: 1px solid var(--border); }
        .summary-number { font-size: 24px; font-weight: 700; }
        .list { margin-top: 16px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .list-item { display: flex; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--list-bg); }
        .badge { font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 4px 8px; border-radius: 4px; }
        .badge-safe { background: var(--success-bg); color: var(--success); }
        .badge-danger { background: var(--danger-bg); color: var(--danger); }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">
            <div class="logo-icon"><i class="ph ph-shield-check"></i></div>
            <span>PhishingShield</span>
        </div>
        <div class="nav-controls">
            <div class="nav-links">
                <a href="/" class="nav-link active">Scanner</a>
                <a href="/dashboard" class="nav-link">Dashboard</a>
            </div>
            <button id="themeToggle" class="theme-toggle"><i class="ph ph-sun"></i></button>
        </div>
    </nav>

    <main>
        <header>
            <h1>URL <span class="highlight">Scanner</span></h1>
            <p style="color: var(--text-muted);">Mission-critical heuristic link analysis</p>
        </header>

        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('single')"><i class="ph ph-link"></i> Single URL</button>
            <button class="mode-btn" onclick="setMode('batch')"><i class="ph ph-stack"></i> Batch</button>
            <button class="mode-btn" onclick="setMode('email')"><i class="ph ph-envelope"></i> Email</button>
        </div>

        <div id="single-mode" class="mode-content">
            <div class="card" id="scannerCard">
                <div style="position: relative;">
                    <i class="ph ph-magnifying-glass" style="position: absolute; left: 20px; top: 18px; color: var(--text-muted); font-size: 20px;"></i>
                    <input type="text" id="urlInput" placeholder="https://example.com/login">
                </div>
                <button class="btn" id="scanBtn" onclick="scanSingle()" style="margin-top: 16px;">
                    <i class="ph ph-shield-chevron"></i> Analyze URL
                </button>
                <div class="quick-actions">
                    <span class="chip" onclick="setUrl('https://google.com')">google.com</span>
                    <span class="chip" onclick="setUrl('https://github.com')">github.com</span>
                    <span class="chip" onclick="setUrl('https://paypa1-secure.tk/login')">suspicious</span>
                </div>
                <div class="loading" id="singleLoading">
                    <div class="dna-scanner active">
                        <svg width="200" height="60"><path class="dna-line" d="M0,30 Q25,0 50,30 T100,30 T150,30 T200,30" /></svg>
                        <div class="scan-bar"></div>
                    </div>
                    <p style="color: var(--primary); font-weight: 600; letter-spacing: 1px;">DECRYPTING HEURISTICS...</p>
                </div>
                <div id="singleResult"></div>
            </div>
        </div>

        <div id="batch-mode" class="mode-content hidden">
            <div class="card">
                <textarea id="batchInput" placeholder="Paste URLs here (one per line)..."></textarea>
                <button class="btn" onclick="scanBatch()" style="margin-top: 16px;"><i class="ph ph-lightning"></i> Scan Batch</button>
                <div id="batchResult"></div>
            </div>
        </div>

        <div id="email-mode" class="mode-content hidden">
            <div class="card">
                <textarea id="emailBody" placeholder="Paste email content here..."></textarea>
                <button class="btn" onclick="scanEmail()" style="margin-top: 16px;"><i class="ph ph-file-search"></i> Analyze Email</button>
                <div id="emailResult"></div>
            </div>
        </div>
    </main>

    <footer class="app-footer">Designed with <i class="ph ph-heart" style="color: var(--danger);"></i> by <span>PhishingShield Team</span></footer>

    <script>
        // Theme Logic
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            themeToggle.innerHTML = isLight ? '<i class="ph ph-moon"></i>' : '<i class="ph ph-sun"></i>';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        });

        function setMode(mode) {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.mode-content').forEach(c => c.classList.add('hidden'));
            event.currentTarget.classList.add('active');
            document.getElementById(mode + '-mode').classList.remove('hidden');
        }

        function setUrl(url) {
            document.getElementById('urlInput').value = url;
            scanSingle();
        }

        async function scanSingle() {
            const url = document.getElementById('urlInput').value.trim();
            if(!url) return;
            const btn = document.getElementById('scanBtn');
            const loading = document.getElementById('singleLoading');
            const resultBox = document.getElementById('singleResult');
            
            btn.disabled = true;
            loading.classList.add('show');
            resultBox.innerHTML = '';

            try {
                const res = await fetch('/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url})
                });
                const data = await res.json();
                loading.classList.remove('show');
                btn.disabled = false;
                showSingleResult(data);
            } catch(e) {
                loading.classList.remove('show');
                btn.disabled = false;
                alert('Error: ' + e.message);
            }
        }

        function showSingleResult(data) {
            const container = document.getElementById('singleResult');
            const level = data.risk_level;
            let statusClass = 'result-danger';
            let title = 'Malicious Threat Detected';
            let color = 'var(--danger)';
            
            if(level === 'low') { statusClass = 'result-safe'; title = 'Secure Domain'; color = 'var(--success)'; }
            else if(level === 'medium') { statusClass = 'result-warning'; title = 'Suspicious / Unverified'; color = 'var(--warning)'; }

            container.innerHTML = `
                <div class="result show ${statusClass}">
                    <div class="result-header">
                        <div class="result-icon" style="color: ${color}"><i class="ph ph-shield-warning"></i></div>
                        <div>
                            <div class="result-title">${title}</div>
                            <div class="result-meta">${data.url}</div>
                        </div>
                    </div>
                    <div class="stats-radar-grid">
                        <div class="stats">
                            <div class="stat"><div class="stat-value" style="color: ${color}">${Math.round(data.combined_score)}</div><div class="stat-label">Risk Score</div></div>
                            <div class="stat"><div class="stat-value">${Math.round(data.heuristic_score)}</div><div class="stat-label">Heuristic</div></div>
                        </div>
                        <div class="radar-box"><canvas id="riskRadar" height="180"></canvas></div>
                    </div>
                    <div class="details-grid">
                        <div class="detail-item"><div class="detail-label">Longevity</div><div class="detail-value">${data.features.domain_age_days || 'N/A'} Days</div></div>
                        <div class="detail-item"><div class="detail-label">Location</div><div class="detail-value">${data.geo.country || 'Unknown'}</div></div>
                    </div>
                </div>
            `;

            setTimeout(() => {
                const ctx = document.getElementById('riskRadar').getContext('2d');
                new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: ['Reputation', 'Entropy', 'Infrastructure', 'Heuristic', 'Keywords'],
                        datasets: [{
                            data: [data.reputation_score, data.features.url_entropy*10, 50, data.heuristic_score, 20],
                            backgroundColor: color + '30', borderColor: color, borderWidth: 2
                        }]
                    },
                    options: { scales: { r: { beginAtZero: true, max: 100, ticks: {display: false}, grid: {color: 'rgba(255,255,255,0.05)'} } }, plugins: {legend: {display: false}} }
                });
            }, 50);

            if(data.feature_breakdown?.length > 0) {
                let alertHtml = `<div class="alerts">`;
                data.feature_breakdown.forEach(f => {
                    alertHtml += `
                        <div class="alert alert-${f.severity}">
                            <div class="alert-icon"><i class="ph ph-info"></i></div>
                            <div class="alert-text"><strong>${f.feature}</strong><span>${f.description}</span></div>
                        </div>
                    `;
                });
                alertHtml += `</div>`;
                container.innerHTML += alertHtml;
            }

            // 3D Tilt
            const card = document.querySelector('.result');
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width - 0.5;
                const y = (e.clientY - rect.top) / rect.height - 0.5;
                gsap.to(card, { rotationY: x * 10, rotationX: -y * 10, ease: 'power2.out', duration: 0.5 });
            });
            card.addEventListener('mouseleave', () => gsap.to(card, { rotationY: 0, rotationX: 0, duration: 0.5 }));
        }

        async function scanBatch() {
            const urls = document.getElementById('batchInput').value.split('\n').filter(u=>u);
            if(!urls.length) return;
            const res = await fetch('/batch', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({urls}) });
            const data = await res.json();
            let bhtml = `<div class="summary"><div class="summary-item"><div class="summary-number">${data.summary.total_scanned}</div><div class="summary-label">Scanned</div></div></div><div class="list">`;
            data.results.forEach(r => {
                bhtml += `<div class="list-item"><span>${r.url}</span><span class="badge ${r.is_phishing?'badge-danger':'badge-safe'}">${r.is_phishing?'Threat':'Safe'}</span></div>`;
            });
            document.getElementById('batchResult').innerHTML = bhtml + '</div>';
        }

        async function scanEmail() {
            const email = document.getElementById('emailBody').value;
            if(!email) return;
            const res = await fetch('/email-analyze', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email}) });
            const data = await res.json();
            document.getElementById('emailResult').innerHTML = `<div class="result show result-safe"><div class="result-title">Analysis Complete</div><p>Found ${data.urls_found} links, ${data.phishing_links} threats.</p></div>`;
        }
    </script>
</body>
</html>
